services:
  db:
    image: postgres:16-alpine
    container_name: ludoteca-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ludoteca}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ludoteca}']
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: `docker compose --profile api up` runs the API in a container too.
  # The default `docker compose up -d db` flow keeps the API on the host for fast reloads.
  api:
    profiles: ['api']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ludoteca-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Inside the compose network the database is reachable at `db`, not localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ludoteca}
      HOST: 0.0.0.0
    ports:
      - '${PORT:-3000}:3000'

volumes:
  pgdata:
